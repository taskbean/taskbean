name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same PR/branch to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  cli-tests:
    name: CLI tests (Node ${{ matrix.node }} / ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # 22.13 is the package.json `engines` floor (where node:sqlite
        # became unflagged). Also test 22 (latest 22.x) to catch upcoming
        # breakage.
        node: ['22.13', '22']
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  python-tests:
    name: Python usage-scanner tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Pure-stdlib scanner tests — safe on Linux/macOS/Windows.
        # The rest of app/agent/test_*.py needs Foundry Local + Windows
        # NPU stack and is intentionally not in CI.
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app/agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install minimal test deps
        # 51 of 53 tests in test_usage_scanners.py exercise the pure-stdlib
        # scanner modules and conftest helpers (uvicorn/httpx/pytest-asyncio).
        # The remaining 2 tests (test_api_todos_merges_db_rows,
        # test_agent_toggle_rejects_string_true) `import main` which pulls
        # the full FastAPI app + opentelemetry + agent-framework + winotify
        # (Windows-only) + tiktoken + many heavy ML deps. We deselect those
        # 2 in this generic Linux/macOS/Windows job — they run in dev where
        # full requirements.txt is installed.
        run: pip install pytest pytest-asyncio uvicorn httpx

      - name: Run usage-scanner tests
        run: pytest test_usage_scanners.py -v --deselect test_usage_scanners.py::test_api_todos_merges_db_rows --deselect test_usage_scanners.py::test_agent_toggle_rejects_string_true

  # Single required status check for branch protection. Configure
  # "Require status checks to pass before merging" → "ci-required" in
  # the repo's branch-protection rules so a green tick here blocks merge
  # if any matrix leg above fails.
  ci-required:
    name: CI required
    if: always()
    needs: [cli-tests, python-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any dependency failed
        run: |
          echo "cli-tests: ${{ needs.cli-tests.result }}"
          echo "python-tests: ${{ needs.python-tests.result }}"
          if [ "${{ needs.cli-tests.result }}" != "success" ] || \
             [ "${{ needs.python-tests.result }}" != "success" ]; then
            exit 1
          fi
