services:
  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.17.0
    ports:
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver
      - "16686:16686"   # Jaeger UI + Query
      - "16685:16685"   # gRPC Query
      - "5778:5778"     # Remote sampling
      - "8889:8889"     # Prometheus metrics (SpanMetrics)
    volumes:
      - ./jaeger-config.yaml:/jaeger/config.yaml
    command: ["--config", "/jaeger/config.yaml"]
    restart: unless-stopped
