<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>taskbean</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0c;
  --surface: #161616;
  --surface-hover: #1e1e1e;
  --border: #2a2a2a;
  --text: #e8e4dd;
  --text-muted: #7a756d;
  --accent: #c8ff73;
  --accent-dim: #c8ff7320;
  --danger: #ff6b6b;
  --warn: #ffbe6b;
  --blue: #6bc5ff;
  --done: #c8ff73;
  --pending: #7a756d;
  --active: #ffbe6b;
  --blocked: #ff6b6b;
  --radius: 8px;
  --font-body: 'Outfit', sans-serif;
  --font-mono: 'DM Mono', monospace;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Subtle grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

.app {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: 100vh;
}

/* ===== Sidebar ===== */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.sidebar-brand {
  padding: 0 20px 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}

.sidebar-brand h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar-brand h1 .bean {
  display: inline-block;
  width: 22px;
  height: 22px;
  background: var(--accent);
  border-radius: 50% 50% 50% 20%;
  transform: rotate(-20deg);
}

.sidebar-brand p {
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  margin-top: 4px;
}

.sidebar-section {
  padding: 8px 12px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
}

.project-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-family: var(--font-body);
  font-size: 13px;
  cursor: pointer;
  width: 100%;
  text-align: left;
  transition: all 0.15s;
}

.project-btn:hover {
  background: var(--surface-hover);
  color: var(--text);
}

.project-btn.active {
  background: var(--accent-dim);
  color: var(--accent);
  border-right: 2px solid var(--accent);
}

.project-btn .count {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 11px;
  opacity: 0.5;
}

.sidebar-footer {
  margin-top: auto;
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}

.export-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 10px;
  background: var(--surface-hover);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}

.export-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* ===== Main ===== */
.main {
  padding: 32px 40px;
  max-width: 900px;
}

.main-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
}

.main-header h2 {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.5px;
}

.stats {
  display: flex;
  gap: 24px;
}

.stat {
  text-align: center;
}

.stat-value {
  font-size: 28px;
  font-weight: 700;
  font-family: var(--font-mono);
  line-height: 1;
}

.stat-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-top: 4px;
}

.stat-done .stat-value { color: var(--done); }
.stat-active .stat-value { color: var(--active); }
.stat-pending .stat-value { color: var(--pending); }

/* Filters */
.filters {
  display: flex;
  gap: 6px;
  margin-bottom: 24px;
}

.filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: none;
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
}

.filter-btn:hover { border-color: var(--text-muted); color: var(--text); }
.filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* Task list */
.task-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.task-item {
  display: grid;
  grid-template-columns: 36px 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-radius: var(--radius);
  background: var(--surface);
  border: 1px solid transparent;
  transition: all 0.15s;
  animation: fadeIn 0.25s ease-out both;
}

.task-item:hover {
  border-color: var(--border);
  background: var(--surface-hover);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.task-status-btn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  color: transparent;
  font-size: 14px;
}

.task-status-btn:hover { border-color: var(--accent); }

.task-item[data-status="done"] .task-status-btn {
  border-color: var(--done);
  background: var(--done);
  color: var(--bg);
}

.task-item[data-status="in_progress"] .task-status-btn {
  border-color: var(--active);
  border-style: dashed;
}

.task-item[data-status="blocked"] .task-status-btn {
  border-color: var(--blocked);
}

.task-title {
  font-size: 14px;
  font-weight: 400;
}

.task-item[data-status="done"] .task-title {
  text-decoration: line-through;
  color: var(--text-muted);
}

.task-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  display: flex;
  gap: 12px;
  align-items: center;
}

.task-id {
  opacity: 0.5;
}

.status-pill {
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 10px;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.status-pill[data-s="done"] { background: #c8ff7318; color: var(--done); }
.status-pill[data-s="in_progress"] { background: #ffbe6b18; color: var(--active); }
.status-pill[data-s="pending"] { background: #7a756d18; color: var(--pending); }
.status-pill[data-s="blocked"] { background: #ff6b6b18; color: var(--blocked); }

.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-muted);
}

.empty-state .bean-large {
  width: 48px;
  height: 48px;
  background: var(--accent-dim);
  border-radius: 50% 50% 50% 20%;
  transform: rotate(-20deg);
  margin: 0 auto 20px;
}

.empty-state p {
  font-family: var(--font-mono);
  font-size: 13px;
  margin-top: 8px;
}

.empty-state code {
  display: inline-block;
  margin-top: 12px;
  padding: 8px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent);
}

/* Responsive */
@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .main { padding: 20px; }
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1><span class="bean"></span> taskbean</h1>
      <p>task management for agents</p>
    </div>
    <div class="sidebar-section">Projects</div>
    <button class="project-btn active" data-project="__all__">
      All Projects
      <span class="count" id="all-count">0</span>
    </button>
    <div id="project-list"></div>
    <div class="sidebar-footer">
      <button class="export-btn" id="export-btn">⬇ Export Markdown</button>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <h2 id="page-title">All Tasks</h2>
      <div class="stats">
        <div class="stat stat-done"><div class="stat-value" id="stat-done">0</div><div class="stat-label">Done</div></div>
        <div class="stat stat-active"><div class="stat-value" id="stat-active">0</div><div class="stat-label">Active</div></div>
        <div class="stat stat-pending"><div class="stat-value" id="stat-pending">0</div><div class="stat-label">Pending</div></div>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="in_progress">Active</button>
      <button class="filter-btn" data-filter="done">Done</button>
      <button class="filter-btn" data-filter="blocked">Blocked</button>
    </div>

    <div class="task-list" id="task-list"></div>
  </main>
</div>

<script>
const API = window.location.origin;
let projects = [];
let tasks = [];
let currentProject = '__all__';
let currentFilter = 'all';

async function fetchProjects() {
  const res = await fetch(`${API}/api/projects`);
  projects = await res.json();
  renderProjects();
}

async function fetchTasks(projectId) {
  const params = new URLSearchParams();
  if (projectId && projectId !== '__all__') params.set('project', projectId);
  const res = await fetch(`${API}/api/tasks?${params}`);
  tasks = await res.json();
  renderTasks();
  updateStats();
}

async function updateTaskStatus(id, status) {
  await fetch(`${API}/api/tasks/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status })
  });
  await fetchTasks(currentProject);
}

function renderProjects() {
  const list = document.getElementById('project-list');
  document.getElementById('all-count').textContent = projects.reduce((s, p) => s + p.total_tasks, 0);
  list.innerHTML = projects.map(p => `
    <button class="project-btn ${currentProject === p.id ? 'active' : ''}" data-project="${p.id}">
      📁 ${p.name}
      <span class="count">${p.total_tasks}</span>
    </button>
  `).join('');

  list.querySelectorAll('.project-btn').forEach(btn => {
    btn.addEventListener('click', () => selectProject(btn.dataset.project));
  });
}

function selectProject(id) {
  currentProject = id;
  document.querySelectorAll('.project-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-project="${id}"]`)?.classList.add('active');
  const proj = projects.find(p => p.id === id);
  document.getElementById('page-title').textContent = id === '__all__' ? 'All Tasks' : proj?.name || 'Tasks';
  fetchTasks(id);
}

function renderTasks() {
  const list = document.getElementById('task-list');
  let filtered = tasks;
  if (currentFilter !== 'all') {
    filtered = tasks.filter(t => t.status === currentFilter);
  }

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="bean-large"></div>
        <h3>No tasks here</h3>
        <p>Tasks added by your coding agent will appear here.</p>
        <code>taskbean add "your task" --json</code>
      </div>`;
    return;
  }

  list.innerHTML = filtered.map((t, i) => `
    <div class="task-item" data-status="${t.status}" style="animation-delay: ${i * 0.03}s">
      <button class="task-status-btn" data-id="${t.id}" title="Toggle status">✓</button>
      <div>
        <div class="task-title">${escapeHtml(t.title)}</div>
      </div>
      <div class="task-meta">
        <span class="task-id">${t.id}</span>
        <span class="status-pill" data-s="${t.status}">${t.status.replace('_', ' ')}</span>
      </div>
    </div>
  `).join('');

  list.querySelectorAll('.task-status-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const task = tasks.find(t => t.id === id);
      const cycle = { pending: 'in_progress', in_progress: 'done', done: 'pending', blocked: 'pending' };
      updateTaskStatus(id, cycle[task.status] || 'pending');
    });
  });
}

function updateStats() {
  document.getElementById('stat-done').textContent = tasks.filter(t => t.status === 'done').length;
  document.getElementById('stat-active').textContent = tasks.filter(t => t.status === 'in_progress').length;
  document.getElementById('stat-pending').textContent = tasks.filter(t => t.status === 'pending').length;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderTasks();
  });
});

// All projects btn
document.querySelector('[data-project="__all__"]').addEventListener('click', () => selectProject('__all__'));

// Export
document.getElementById('export-btn').addEventListener('click', async () => {
  const byProject = {};
  for (const t of tasks) {
    const pName = t.project_name || 'Unknown';
    if (!byProject[pName]) byProject[pName] = [];
    byProject[pName].push(t);
  }
  let md = '# taskbean export\\n\\n';
  for (const [proj, pts] of Object.entries(byProject)) {
    md += `## ${proj}\\n\\n| Task | Status | Created |\\n|------|--------|---------|\\n`;
    for (const t of pts) md += `| ${t.title} | ${t.status} | ${t.created_at} |\\n`;
    md += '\\n';
  }
  const blob = new Blob([md.replace(/\\n/g, '\n')], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `taskbean-export-${new Date().toISOString().split('T')[0]}.md`;
  a.click();
});

// Auto-refresh every 5 seconds
fetchProjects().then(() => fetchTasks('__all__'));
setInterval(() => {
  fetchProjects();
  fetchTasks(currentProject);
}, 5000);
</script>
</body>
</html>
